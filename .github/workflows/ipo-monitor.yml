name: 🇭🇰 香港IPO自动监控

on:
  schedule:
    # 每天香港时间早上 9:00（UTC 01:00）
    - cron: "0 1 * * *"
    # 每天香港时间下午 4:00（UTC 08:00，收市后）
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "手动触发原因"
        required: false
        default: "手动运行"

jobs:
  monitor:
    name: 运行IPO监控
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🔍 运行IPO监控
        env:
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/monitor.py

      - name: 💾 提交报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/
          git diff --staged --quiet || git commit -m "📊 自动更新IPO报告 $(TZ='Asia/Hong_Kong' date '+%Y-%m-%d %H:%M HKT')"
          git push
